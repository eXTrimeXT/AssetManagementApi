<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1920 1080"
     width="100%"
     height="100%"
     style="border: 1px solid #ccc; background: #fff;">

  <defs>
    <!-- Сетка -->
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>

    <!-- Градиент -->
    <linearGradient id="workshopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Сетка -->
  <rect width="1920" height="1080" fill="url(#grid)" />

  <!-- Г-образный цех (Цех сборки) -->
  <polygon
    points="0,1080 1920,1080 1920,0 1300,0 1300,480 0,480"
    fill="#898989"
    stroke="#2E7D32"
    stroke-width="3"
  />

  <!-- Название цеха -->
  <text x="960" y="900"
        font-family="Arial, sans-serif"
        font-size="36"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
    Цех сборки
  </text>

  <text x="960" y="950"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
    Код: 1-04
  </text>

  <!-- Угловые точки -->
  <g fill="#ff0000">
    <circle cx="0" cy="1080" r="6"/>
    <circle cx="1920" cy="1080" r="6"/>
    <circle cx="1920" cy="0" r="6"/>
    <circle cx="1300" cy="0" r="6"/>
    <circle cx="1300" cy="480" r="6"/>
    <circle cx="0" cy="480" r="6"/>
  </g>

  <!-- Подписи координат -->
  <g font-family="monospace" font-size="12" fill="#333">
    <text x="10" y="1070">(0, 1080)</text>
    <text x="1850" y="1070">(1920, 1080)</text>
    <text x="1850" y="20">(1920, 0)</text>
    <text x="1370" y="20">(1300, 0)</text>
    <text x="1370" y="710">(1300, 480)</text>
    <text x="10" y="710">(0, 480)</text>
  </g>

  <!-- Размеры -->
  <text x="960" y="50"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#333"
        text-anchor="middle">
    1920 × 1080 px
  </text>
</svg>