<svg xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 1000 1000"
    width="100%"
    height="100%"
    style="border: 2px solid #333; background: #fff;">

    <defs>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Цех двигателей 1-05 (желтый, вверху по центру) -->
    <polygon
        points="400,100 650,100 650,200 400,200"
        fill="#FFFF00"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="525" y="170"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#000"
        text-anchor="middle"
        font-weight="bold">
        Цех двигателей
    </text>
    <text x="525" y="195"
        font-family="Arial, sans-serif"
        font-size="14"
        fill="#000"
        text-anchor="middle">
        1-05
    </text>

    <!-- Цех сборки 1-04 (серо-зеленый, Г-образный) -->
    <polygon
        points="350,200 650,200 650,100 800,100 800,350 350,350"
        fill="#4A6B6B"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="500" y="250"
        font-family="Arial, sans-serif"
        font-size="28"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        Цех сборки
    </text>
    <text x="500" y="290"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#fff"
        text-anchor="middle">
        1-04
    </text>

    <!-- Логистика 1-06 (оранжевый, слева) -->
    <polygon
        points="150,200 350,200 350,350 150,350"
        fill="#FF7F2A"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="275" y="245"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#000"
        text-anchor="middle"
        font-weight="bold">
        логистика
    </text>
    <text x="275" y="270"
        font-family="Arial, sans-serif"
        font-size="14"
        fill="#000"
        text-anchor="middle">
        1-06
    </text>

    <!-- Цех сварки 1-02 (красный, по центру) -->
    <polygon
        points="220,350 500,350 500,650 220,650"
        fill="#E61919"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="400" y="495"
        font-family="Arial, sans-serif"
        font-size="18"
        fill="#000"
        text-anchor="middle"
        font-weight="bold">
        цех сварки
    </text>
    <text x="400" y="520"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#000"
        text-anchor="middle">
        1-02
    </text>

    <!-- Цех окраски 1-03 (голубой, справа большой) -->
    <polygon
        points="550,350 750,350 750,850 550,850"
        fill="#A0D8EF"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="650" y="595"
        font-family="Arial, sans-serif"
        font-size="18"
        fill="#000"
        text-anchor="middle"
        font-weight="bold">
        цех окраски
    </text>
    <text x="650" y="620"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#000"
        text-anchor="middle">
        1-03
    </text>

    <!-- Цех штамповки 1-01 (синий, внизу слева) -->
    <polygon
        points="150,650 500,650 500,750 150,750"
        fill="#2B3EC4"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="350" y="695"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        цех штамповки
    </text>
    <text x="350" y="720"
        font-family="Arial, sans-serif"
        font-size="14"
        fill="#fff"
        text-anchor="middle">
        1-01
    </text>

    <!-- Главный офис 1-07 (зеленый, внизу справа) -->
    <polygon
        points="550,850 750,850 750,950 550,950"
        fill="#00FF00"
        stroke="#333"
        stroke-width="2"
        filter="url(#shadow)"
    />
    <text x="650" y="895"
        font-family="Arial, sans-serif"
        font-size="16"
        fill="#000"
        text-anchor="middle"
        font-weight="bold">
        главный офис
    </text>
    <text x="650" y="920"
        font-family="Arial, sans-serif"
        font-size="14"
        fill="#000"
        text-anchor="middle">
        1-07
    </text>

</svg>