<svg xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 1000 1300"
    width="100%"
    height="100%"
    style="border: 2px solid #333; background: #fafafa;">

    <defs>
        <!-- Тень -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.4"/>
        </filter>
    </defs>

    <!-- ЦЕХ ДВИГАТЕЛЕЙ (желтый) -->
    <polygon
        points="350,0 650,0 650,150 350,150"
        fill="#D4C82A"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="525" y="75"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ЦЕХ ДВИГАТЕЛЕЙ
    </text>
    <text x="525" y="110"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-05
    </text>

    <!-- ЦЕХ СБОРКИ 1-04 (серо-зеленый, Г-образный, большой) -->
    <polygon
        points="300,150 650,150 650,0 900,0 900,400 300,400"
        fill="#5F7A72"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="600" y="275"
        font-family="Arial, sans-serif"
        font-size="24"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ЦЕХ СБОРКИ
    </text>
    <text x="600" y="310"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-04
    </text>

    <!-- ЛОГИСТИКА 1-06 (оранжевый, слева) -->
    <polygon
        points="50,150 300,150 300,400 50,400"
        fill="#E8943A"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="175" y="275"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ЛОГИСТИКА
    </text>
    <text x="175" y="310"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-06
    </text>

    <!-- ЦЕХ СВАРКИ 1-02 (красный) -->
    <polygon
        points="150,400 450,400 450,750 150,750"
        fill="#B8422A"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="300" y="575"
        font-family="Arial, sans-serif"
        font-size="24"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ЦЕХ СВАРКИ
    </text>
    <text x="300" y="610"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-02
    </text>

    <!-- ЦЕХ ОКРАСКИ 1-03 (бирюзовый, справа большой) -->
    <polygon
        points="550,400 850,400 850,1000 550,1000"
        fill="#4DB8A8"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="700" y="675"
        font-family="Arial, sans-serif"
        font-size="24"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ЦЕХ ОКРАСКИ
    </text>
    <text x="700" y="710"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-03
    </text>

    <!-- ЦЕХ ШТАМПОВКИ 1-01 (синий, под цехом сварки) -->
    <polygon
        points="50,750 450,750 450,900 50,900"
        fill="#1E3A6E"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="250" y="825"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ЦЕХ ШТАМПОВКИ
    </text>
    <text x="250" y="860"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-01
    </text>

    <!-- ГЛАВНЫЙ ОФИС 1-07 (зеленый, внизу справа) -->
    <polygon
        points="550,1000 850,1000 850,1150 550,1150"
        fill="#2E7D32"
        stroke="#333"
        stroke-width="3"
        filter="url(#shadow)"
    />
    <text x="700" y="1075"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#fff"
        text-anchor="middle"
        font-weight="bold">
        ГЛАВНЫЙ ОФИС
    </text>
    <text x="700" y="1110"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#fff"
        text-anchor="middle">
        1-07
    </text>

</svg>